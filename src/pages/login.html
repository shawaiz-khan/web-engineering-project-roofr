<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/login.css">
    <title>Login | Roofr</title>
</head>

<body>
    <div class="login-container">
        <div class="form-main-container">
            <h1>Log into Your Account</h1>
            <form class="form-container">
                <div class="form-inputs-container">
                    <div class="form-input-label-container">
                        <label for="email">Email</label>
                        <input type="email" placeholder="person@mail.com">
                    </div>

                    <div class="form-input-label-container">
                        <label for="password">Password</label>
                        <input type="password" placeholder="secure@pass">
                    </div>

                    <a href="#">
                        <span>Forgot Password?</span>
                    </a>
                </div>

                <div class="button-container">
                    <button type="submit">Login</button>

                    <div class="form-cta-container">
                        <span>Don&apos;t have an account?</span>
                        <a href="./signup.html" class="form-cta-text">Signup</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</body>

<script src="./scripts/global.js"></script>

</html>
