<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/signup.css">
    <title>Signup | Roofr</title>
</head>

<body>
    <div class="signup-container">
        <div class="form-main-container">
            <h1>Create a New Account</h1>
            <form class="form-container">
                <div class="form-inputs-container">
                    <div class="form-multi-input-container">
                        <div class="form-input-label-container">
                            <label for="name">Name</label>
                            <input type="text" placeholder="Shawaiz Khan">
                        </div>

                        <div class="form-input-label-container">
                            <label for="username">Username</label>
                            <input type="text" placeholder="shawaizkhan">
                        </div>
                    </div>

                    <div class="form-input-label-container">
                        <label for="email">Email</label>
                        <input type="email" placeholder="shawaiz@mail.com">
                    </div>

                    <div class="form-input-label-container">
                        <label for="phonenumber">Phone Number</label>
                        <input type="email" placeholder="+92xxxxxxxxxx">
                    </div>

                    <div class="form-multi-input-container">
                        <div class="form-input-label-container">
                            <label for="password">Password</label>
                            <input type="password" placeholder="secure@pass">
                        </div>

                        <div class="form-input-label-container">
                            <label for="confirmPassword">Confirm Password</label>
                            <input type="password">
                        </div>
                    </div>
                </div>

                <div class="button-container">
                    <button type="submit">Signup</button>

                    <div class="form-cta-container">
                        <span>Already have an account?</span>
                        <a href="./login.html" class="form-cta-text">Login</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</body>

<script src="./scripts/global.js"></script>

</html>
